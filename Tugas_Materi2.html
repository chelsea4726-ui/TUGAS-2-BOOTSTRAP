<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Environment</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjJp/nGEQzCj9Yh40qHofnK7f8e8P2d1gW42d2j2l+p6T1r5t1n5" crossorigin="anonymous">
    <!-- Custom CSS (untuk styling tambahan) -->
    <style>
        /* Gaya umum */
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        /* Topbar */
        .topbar {
            background-color: #343a40; /* Dark background */
            color: #fff;
            padding: 8px 0;
            font-size: 0.9rem;
        }
        .topbar a {
            color: #fff;
            text-decoration: none;
            margin-right: 15px;
        }

        /* Navbar */
        .navbar-custom {
            background-color: #ffffff; /* White background for navbar */
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .navbar-custom .nav-link {
            color: #333;
            font-weight: 500;
        }
        .navbar-custom .navbar-brand {
            font-weight: bold;
            color: #28a745; /* Green brand color */
        }
        .btn-donate-now {
            background-color: #28a745; /* Green button */
            color: #fff;
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: bold;
        }
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1020; /* Lebih tinggi dari elemen lain */
        }

        /* Hero Carousel */
        .hero-carousel {
            position: relative;
            height: 600px; /* Contoh tinggi */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            background-image: url('https://via.placeholder.com/1920x600/28a745/ffffff?text=Background+Hero'); /* Placeholder image */
        }
        .hero-carousel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Overlay gelap */
        }
        .hero-carousel .content {
            position: relative;
            z-index: 1;
        }
        .hero-carousel h1 {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .hero-carousel p {
            font-size: 1.25rem;
            margin-bottom: 30px;
        }

        /* About Us */
        .about-us .img-frame {
            border: 5px solid #28a745; /* Decorative green frame */
            padding: 5px;
        }
        .about-us ul {
            list-style: none;
            padding: 0;
        }
        .about-us ul li::before {
            content: "\2713"; /* Checklist icon */
            color: #28a745;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }
        .btn-learn-more {
            background-color: #28a745;
            color: #fff;
            border-radius: 5px;
            padding: 10px 25px;
        }

        /* Feature Cards */
        .feature-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
        }
        .feature-card:hover {
            transform: translateY(-5px);
        }
        .feature-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .feature-card .card-body {
            padding: 20px;
        }
        .feature-card .card-body h5 {
            font-weight: bold;
            color: #28a745;
        }
        .feature-card .card-body p {
            font-size: 0.95rem;
            color: #666;
        }
        .feature-card .btn-read-more {
            display: none; /* Default hidden */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #28a745;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .feature-card:hover .btn-read-more {
            display: block; /* Show on hover */
        }

        /* Services/Causes */
        .service-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
            text-align: center;
            padding: 30px 20px;
            margin-top: -50px; /* margin-top negatif */
            position: relative; /* Untuk z-index */
            z-index: 10;
        }
        .service-card h4 {
            color: #28a745;
            font-weight: bold;
        }
        .service-card p {
            color: #666;
        }

        .donation-progress .progress {
            height: 10px;
            background-color: #e9ecef;
        }
        .donation-progress .progress-bar {
            background-color: #28a745;
        }

        .icon-text-grid .col {
            text-align: center;
            padding: 20px 0;
        }
        .icon-text-grid .col i {
            font-size: 2.5rem;
            color: #28a745;
        }
        .icon-text-grid .col h5 {
            margin-top: 10px;
            font-weight: bold;
        }
        .latest-causes .card {
            background-color: #28a745; /* Green background */
            color: #fff;
            border: none;
        }
        .latest-causes .card img {
            height: 200px;
            object-fit: cover;
        }
        .latest-causes .card-body {
            padding: 15px;
        }
        .latest-causes .card-title {
            font-weight: bold;
        }
        .latest-causes .card-text {
            font-size: 0.9rem;
        }
        .latest-causes .btn-read-more-green {
            background-color: #fff;
            color: #28a745;
            border: none;
            padding: 5px 10px;
            font-size: 0.8rem;
        }


        /* Events */
        .event-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
            overflow: hidden;
            position: relative;
        }
        .event-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .event-card .event-label {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #28a745;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .event-card .card-body {
            padding: 20px;
        }
        .event-card .card-title {
            font-weight: bold;
            color: #333;
        }
        .event-card .event-details span {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }
        .event-card .event-details i {
            margin-right: 5px;
            color: #28a745;
        }

        /* Latest News */
        .news-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
            overflow: hidden;
        }
        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .news-card .card-body {
            padding: 20px;
        }
        .news-card .news-category {
            background-color: #28a745;
            color: #fff;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .news-card .news-date {
            font-size: 0.8rem;
            color: #999;
            margin-left: 10px;
        }
        .news-card .card-title {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
            margin-top: 5px;
        }
        .news-card .card-text {
            font-size: 0.9rem;
            color: #666;
        }

        /* Galeri Foto */
        .gallery-grid img {
            width: 100%;
            height: 250px; /* Fixed height for gallery images */
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gallery-grid img:hover {
            transform: scale(1.05);
        }
        .gallery-grid .gallery-item {
            position: relative;
            overflow: hidden;
        }
        .gallery-grid .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .gallery-grid .gallery-item:hover .overlay {
            opacity: 1;
        }
        .gallery-grid .overlay i {
            color: #fff;
            font-size: 2rem;
        }

        /* Volunter */
        .volunteer-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
        }
        .volunteer-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .volunteer-card .overlay-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .volunteer-card:hover .overlay-info {
            transform: translateY(0);
        }
        .volunteer-card .overlay-info h5 {
            margin-bottom: 5px;
        }
        .volunteer-card .overlay-info p {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .volunteer-card .social-icons a {
            color: #fff;
            font-size: 1.2rem;
            margin: 0 8px;
        }

        /* Footer */
        footer {
            background-color: #343a40;
            color: #fff;
            padding: 50px 0 20px;
            font-size: 0.9rem;
        }
        footer h5 {
            color: #28a745;
            font-weight: bold;
            margin-bottom: 20px;
        }
        footer ul {
            list-style: none;
            padding: 0;
        }
        footer ul li a {
            color: #ccc;
            text-decoration: none;
            margin-bottom: 8px;
            display: block;
        }
        footer ul li a:hover {
            color: #fff;
        }
        footer .newsletter input[type="email"] {
            border: none;
            padding: 10px;
            border-radius: 5px;
            width: calc(100% - 110px);
        }
        footer .newsletter button {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
        }
        footer .social-footer a {
            color: #fff;
            font-size: 1.5rem;
            margin-right: 15px;
        }
        .copyright {
            border-top: 1px solid #444;
            padding-top: 20px;
            margin-top: 30px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <!-- 1. Navbar & Topbar -->
    <div class="topbar d-none d-md-block">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-start">
                    <span><i class="fas fa-map-marker-alt me-2"></i>Alamat, Email</span>
                </div>
                <div class="col-md-6 text-end">
                    <a href="#"><i class="fab fa-facebook-f me-2"></i></a>
                    <a href="#"><i class="fab fa-twitter me-2"></i></a>
                    <a href="#"><i class="fab fa-instagram me-2"></i></a>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">WARISAN MASA DEPAN
